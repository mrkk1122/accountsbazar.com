name: Deploy Static Site to GitHub Pages

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Pages is enabled
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")

          if [ "$STATUS" != "200" ]; then
            echo "GitHub Pages is not enabled for $REPO (HTTP $STATUS)."
            echo "Enable it here: https://github.com/$REPO/settings/pages"
            echo "Set Source to: GitHub Actions"
            cat /tmp/pages.json || true
            exit 1
          fi

      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp -r index.html assets _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
